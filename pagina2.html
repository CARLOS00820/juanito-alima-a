<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Voleibol</title>
</head>
<body>

    <h1>Formulario sobre el Voleibol</h1>

    <form>
        <label>Nombre:</label>
        <input type="text" name="nombre"><br><br>

        <label>Edad:</label>
        <input type="number" name="edad"><br><br>

    
        <p>¿Te gusta el voleibol?</p>
        <input type="radio" name="gusto" value="si"> Sí
        <input type="radio" name="gusto" value="no"> No<br><br>

        <p>¿Qué posición prefieres?</p>
        <select name="posicion">
            <option>Libero</option>
            <option>Colocador</option>
            <option>Punta</option>
            <option>Opuesto</option>
            <option>Central</option>
        </select><br><br>

        <input type="submit" value="Enviar">
        <input type="reset" value="Limpiar">

    </form>

    <br>

    <a href="index.html">Volver al inicio</a>

</body>
</html>
